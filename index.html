<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport">
    <link rel="stylesheet" href="library.css">
    <title>Project: Library</title>
</head>
<body>
    <header>
        <h1>My Library</h1>
        <button class="new-button" command="show-modal" commandfor="my-dialog">Add New Book</button>
        <dialog id="my-dialog">
            <form>
                <div class="label">
                    <label for="book">Book:</label>
                    <input type="text" name="title" id="book">
                </div>
                <div class="label">
                    <label for="author">Author:</label>
                    <input type="text" name="author" id="author">
                </div>
                <div class="label">
                    <label for="pages">Number of Pages:</label>
                    <input type="number" name="pages" id="pages">
                </div>
                <div class="label">
                    <label for="read">Have you read this?</label>
                    <input type="checkbox" name="read" id="read" value="yes">
                </div>
                <button type="submit">Submit</button>
                <button type="button">Close</button>
            </form>
        </dialog>
    </header>
    <div class="container">
        <table class="table-container">
            <thead>
                <tr>
                    <td>Title</td>
                    <td>Author</td>
                    <td class="pages">Pages</td>
                    <td class="read">Read</td>
                    <td class="delete-column">Delete</td>
                </tr>
            </thead>
            <tbody class="table-body">
            </tbody>
        </table>
    </div>
<script src="library.js">
</script>
</body>
</html>
